services:
  - type: web
    name: qaviewer-api
    runtime: node
    plan: starter
    repo: https://github.com/Orbis-GIS-Team/QAViewer
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STARTUP_DATA_MODE
        value: validate
      - key: DEMO_MODE
        value: "false"
      - key: API_HOST
        value: 0.0.0.0
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: qaviewer-documents

  - type: web
    name: qaviewer-web
    runtime: static
    repo: https://github.com/Orbis-GIS-Team/QAViewer
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_REGRID_FEATURE_SERVICE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
